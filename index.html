<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SOSHIOTSUKI Walkthrough</title>

  <link rel="stylesheet" href="pannellum.css"/>
  <script src="pannellum.js"></script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: black;
    }

    #panorama {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #textbox {
      position: fixed;
      top: 40px;
      right: 40px;

      z-index: 999999;
      pointer-events: none;

      color: rgba(255,255,255,0.85);

      font-family: Helvetica, Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;

      padding: 8px 0;
    }

    /* Remove UI */
    .pnlm-controls-container,
    .pnlm-compass,
    .pnlm-hot-spot-debug-indicator {
      display: none !important;
    }
  </style>
</head>

<body>

  <div id="panorama"></div>

  <div id="textbox">
    this is just a test
  </div>

  <script>
    pannellum.viewer('panorama', {

      default: {
        firstScene: 'scene1',
        sceneFadeDuration: 1000
      },

      scenes: {

        scene1: {
          title: 'Pièce 1',
          panorama: 'PANO1.jpg',
          autoLoad: true,

          hotSpots: [
            {
              pitch: -22.033251177322494,
              yaw: -3.166729427553865,
              type: 'scene',
              sceneId: 'scene2',
              text: 'Aller pièce 2'
            }
          ]
        },

        scene2: {
          title: 'Pièce 2',
          panorama: 'PANO2.jpg',
          autoLoad: true,

          hotSpots: [
            {
              pitch: -10,
              yaw: -130,
              type: 'scene',
              sceneId: 'scene1',
              text: 'Retour pièce 1'
            }
          ]
        }

      }

    });
  </script>

</body>
</html>
